version: "3.8"

services:
  evolution-api:
    image: atendai/evolution-api:latest
    ports:
      - "8080:8080"
    environment:
      # URL pública onde a Evolution API é acessível (ex: http://SEU_IP:8080)
      SERVER_URL: "${EVOLUTION_SERVER_URL}"

      # Autenticação — use a mesma chave em EVOLUTION_API_KEY no .env do projeto
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: "${EVOLUTION_API_KEY}"

      # Webhook global — aponta para o Railway (rota do Laika)
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: "${EVOLUTION_WEBHOOK_GLOBAL_URL}"
      WEBHOOK_GLOBAL_EVENTS: "MESSAGES_UPSERT"

      # Armazenamento em arquivo (sem banco extra)
      DATABASE_ENABLED: "false"
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      STORE_CONTACTS: "true"
      STORE_CHATS: "true"

      # Timezone
      TZ: "America/Sao_Paulo"

    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          memory: 512M

volumes:
  evolution_instances:
  evolution_store:
